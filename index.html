<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<meta name="theme-color" content="#111827" />
<title>Budget Manage</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f3f4f6;color:#111827}
button,input,textarea{font-family:inherit}
.app{max-width:520px;min-height:100vh;margin:0 auto;background:#f9fafb;padding:18px 16px 92px}
.header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.menu-btn{width:42px;height:42px;border:1px solid #e5e7eb;border-radius:14px;background:#fff;font-size:22px;font-weight:900;cursor:pointer;box-shadow:0 2px 8px rgba(15,23,42,.06)}
.title-area{min-width:0;flex:1}
.title{font-size:23px;font-weight:900;letter-spacing:-.6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.subtitle{margin-top:2px;font-size:12px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.name-btn{border:0;background:#eef2ff;color:#3730a3;border-radius:999px;padding:8px 11px;font-size:13px;font-weight:850;cursor:pointer;flex-shrink:0}
.summary{background:#111827;color:white;border-radius:24px;padding:20px;box-shadow:0 12px 30px rgba(17,24,39,.18);margin-bottom:18px}
.summary-label{color:#9ca3af;font-size:13px;margin-bottom:6px}
.balance{font-size:34px;font-weight:950;letter-spacing:-1.2px;margin-bottom:18px;word-break:break-all}
.summary-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.summary-card{background:rgba(255,255,255,.08);border-radius:16px;padding:12px}
.summary-card .label{color:#d1d5db;font-size:12px;margin-bottom:4px}
.summary-card .amount{font-size:18px;font-weight:850;word-break:break-all}
.income{color:#60a5fa}.expense{color:#f87171}
.section-title-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:22px 0 10px}
.section-title{font-size:17px;font-weight:900}.sort-hint{font-size:12px;color:#6b7280;white-space:nowrap}
.list{display:flex;flex-direction:column;gap:8px}
.item{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:14px;display:grid;grid-template-columns:1fr auto;gap:12px;box-shadow:0 2px 8px rgba(15,23,42,.04)}
.item-left{min-width:0}.item-top{display:flex;align-items:center;gap:6px;min-width:0;margin-bottom:4px}
.day-badge{flex-shrink:0;min-width:42px;height:24px;border-radius:999px;background:#f3f4f6;color:#374151;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}
.item-name{font-size:16px;font-weight:850;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-note{font-size:12px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-height:16px}
.empty-note{color:#c2c7cf}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.item-amount{font-size:16px;font-weight:950;text-align:right;white-space:nowrap}
.item-actions{display:flex;align-items:center;gap:5px}
.mini-btn,.edit-btn{border:0;background:#f3f4f6;color:#374151;border-radius:11px;padding:8px 9px;font-weight:900;cursor:pointer;line-height:1}
.mini-btn:disabled{opacity:.3;cursor:default}
.empty{text-align:center;color:#9ca3af;padding:34px 12px;background:#fff;border:1px dashed #d1d5db;border-radius:18px}
.fab{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);width:min(488px,calc(100vw - 32px));height:58px;border:0;border-radius:18px;background:#111827;color:#fff;font-size:18px;font-weight:900;box-shadow:0 14px 30px rgba(17,24,39,.28);cursor:pointer}
.modal-backdrop,.drawer-backdrop{position:fixed;inset:0;background:rgba(17,24,39,.52);display:none;z-index:10}
.open{display:block}
.modal-wrap{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;padding:12px}
.modal{width:min(520px,100%);max-height:calc(100vh - 30px);overflow:auto;background:white;border-radius:26px;padding:20px;box-shadow:0 -12px 40px rgba(0,0,0,.18)}
.modal-title{font-size:20px;font-weight:950;margin-bottom:16px}
.field{margin-bottom:12px}.field label{display:block;font-size:13px;font-weight:800;color:#374151;margin-bottom:6px}
.input{width:100%;height:50px;border:1px solid #d1d5db;border-radius:14px;padding:0 14px;font-size:16px;outline:none;background:#fff}
textarea.input{height:72px;resize:none;padding-top:12px;line-height:1.35}.input:focus{border-color:#111827}
.type-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.type-btn{height:48px;border:1px solid #d1d5db;background:#fff;border-radius:14px;font-size:16px;font-weight:850;cursor:pointer}
.type-btn.active.income{background:#dbeafe;border-color:#60a5fa;color:#1d4ed8}.type-btn.active.expense{background:#fee2e2;border-color:#f87171;color:#b91c1c}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.action-btn{height:50px;border:0;border-radius:14px;font-size:16px;font-weight:900;cursor:pointer}
.cancel-btn{background:#f3f4f6;color:#374151}.save-btn{background:#111827;color:white}
.delete-btn{width:100%;height:46px;margin-top:8px;border:0;border-radius:14px;background:#fee2e2;color:#b91c1c;font-weight:900;cursor:pointer;display:none}
.delete-btn.show{display:block}
.drawer{width:min(420px,90vw);height:100%;background:#fff;padding:18px 14px;box-shadow:14px 0 40px rgba(0,0,0,.18);transform:translateX(-100%);transition:.18s;display:flex;flex-direction:column;gap:12px}
.drawer-backdrop.open .drawer{transform:translateX(0)}
.drawer-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:2px 2px 8px}
.drawer-title{font-size:20px;font-weight:950}.drawer-close{width:36px;height:36px;border:0;border-radius:12px;background:#f3f4f6;font-size:20px;cursor:pointer}
.new-sheet-btn{height:48px;border:0;border-radius:15px;background:#111827;color:#fff;font-size:16px;font-weight:900;cursor:pointer}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.side-btn{height:44px;border:0;border-radius:14px;background:#f3f4f6;color:#374151;font-size:14px;font-weight:900;cursor:pointer}
.side-btn.primary{background:#111827;color:#fff}
.github-box{border:1px solid #e5e7eb;border-radius:16px;padding:12px;background:#fafafa}
.github-title{font-size:14px;font-weight:950;margin-bottom:8px}
.github-status{font-size:12px;color:#6b7280;line-height:1.4;margin-top:8px;white-space:pre-line}
.sheet-list{overflow:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:12px}
.sheet-item{border:1px solid #e5e7eb;background:#fff;border-radius:16px;padding:12px;display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer}
.sheet-item.active{border-color:#111827;background:#f9fafb}
.sheet-name{font-size:15px;font-weight:850;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sheet-meta{margin-top:2px;font-size:12px;color:#6b7280}
.sheet-actions{display:flex;gap:5px;flex-shrink:0}
.sheet-edit,.sheet-delete{border:0;border-radius:12px;padding:8px 9px;font-weight:900;cursor:pointer}
.sheet-edit{background:#eef2ff;color:#3730a3}.sheet-delete{background:#fee2e2;color:#b91c1c}
.hidden-file{display:none}
.warn{font-size:12px;color:#6b7280;line-height:1.45;margin-top:8px}

.toast{
  position:fixed;
  left:50%;
  bottom:92px;
  transform:translateX(-50%) translateY(16px);
  max-width:min(460px,calc(100vw - 32px));
  background:#111827;
  color:white;
  padding:12px 16px;
  border-radius:999px;
  font-size:14px;
  font-weight:850;
  box-shadow:0 12px 30px rgba(17,24,39,.25);
  opacity:0;
  pointer-events:none;
  transition:.18s ease;
  z-index:30;
  text-align:center;
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
.toast.error{
  background:#b91c1c;
}


.summary{
  position:relative;
}
.summary-toggle{
  position:absolute;
  top:14px;
  right:14px;
  width:34px;
  height:34px;
  border:0;
  border-radius:50%;
  background:rgba(255,255,255,.12);
  color:white;
  font-size:18px;
  font-weight:950;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.summary.collapsed{
  padding-bottom:16px;
}
.summary.collapsed .balance,
.summary.collapsed .summary-row{
  display:none;
}
.summary.collapsed .summary-label{
  margin-bottom:0;
}


.modal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:16px;
}
.modal-head .modal-title{
  margin-bottom:0;
}
.modal-close-btn{
  width:36px;
  height:36px;
  border:0;
  border-radius:12px;
  background:#f3f4f6;
  color:#374151;
  font-size:22px;
  font-weight:950;
  cursor:pointer;
  line-height:1;
}

</style>
</head>
<body>
<main class="app">
  <div class="header">
    <button class="menu-btn" id="menuBtn">☰</button>
    <div class="title-area"><div class="title" id="sheetTitle">예산표</div><div class="subtitle" id="subTitle">선택한 지출표 기준으로 계산</div></div>
    <button class="name-btn" id="renameBtn">이름수정</button>
  </div>
  <section class="summary" id="summaryBox">
    <button class="summary-toggle" id="summaryToggleBtn" title="접기/펼치기">⌃</button>
    <div class="summary-label">남은 금액</div><div class="balance" id="balanceAmount">0원</div>
    <div class="summary-row"><div class="summary-card"><div class="label">총 수입</div><div class="amount income" id="incomeAmount">0원</div></div><div class="summary-card"><div class="label">총 지출</div><div class="amount expense" id="expenseAmount">0원</div></div></div>
  </section>
  <div class="section-title-row"><div class="section-title">수입 / 지출 리스트</div><div class="sort-hint">↑↓ 순서변경</div></div>
  <section class="list" id="list"></section>
</main>
<button class="fab" id="addBtn">+ 추가</button>

<div class="drawer-backdrop" id="drawerBackdrop">
  <aside class="drawer">
    <div class="drawer-head"><div class="drawer-title">지출표 목록</div><button class="drawer-close" id="drawerCloseBtn">×</button></div>
    <button class="new-sheet-btn" id="newSheetBtn">+ 새 지출표 만들기</button>
    <div class="grid2"><button class="side-btn" id="exportBtn">내보내기</button><button class="side-btn" id="importBtn">가져오기</button></div>
    <input class="hidden-file" id="importFileInput" type="file" accept=".json,application/json" />
    <div class="github-box">
      <div class="github-title">GitHub 공유 저장</div>
      <div class="grid2"><button class="side-btn" id="loadGithubBtn">수동 불러오기</button><button class="side-btn primary" id="saveGithubBtn">수동 저장</button></div><button class="side-btn" id="testGithubBtn" style="width:100%;margin-top:8px;">연결 테스트</button>
      <button class="side-btn" id="githubSettingBtn" style="width:100%;margin-top:8px;">GitHub 설정</button>
      <div class="github-status" id="githubStatus">상태 확인 중...</div>
    </div>
    <div class="sheet-list" id="sheetList"></div>
  </aside>
</div>

<div class="modal-backdrop" id="itemModalBackdrop"><div class="modal-wrap"><div class="modal">
  <div class="modal-head"><div class="modal-title" id="itemModalTitle">추가</div><button class="modal-close-btn" id="closeItemModalBtn">×</button></div>
  <div class="type-row"><button class="type-btn income active" id="incomeTypeBtn">+ 수입</button><button class="type-btn expense" id="expenseTypeBtn">- 지출</button></div>
  <div class="field"><label>일자</label><input class="input" id="dayInput" type="number" inputmode="numeric" min="1" max="31" placeholder="예: 25"></div>
  <div class="field"><label>이름</label><input class="input" id="nameInput" placeholder="예: 월급, 식비, 카드값"></div>
  <div class="field"><label>금액</label><input class="input" id="amountInput" type="text" inputmode="numeric" placeholder="예: 50,000"></div>
  <div class="field"><label>비고</label><textarea class="input" id="noteInput" placeholder="예: 매달 고정, 카드 자동이체"></textarea></div>
  <div class="modal-actions"><button class="action-btn cancel-btn" id="cancelItemBtn">취소</button><button class="action-btn save-btn" id="saveItemBtn">저장</button></div>
  <button class="delete-btn" id="deleteItemBtn">삭제</button>
</div></div></div>

<div class="modal-backdrop" id="sheetModalBackdrop"><div class="modal-wrap"><div class="modal">
  <div class="modal-head"><div class="modal-title" id="sheetModalTitle">지출표 이름</div><button class="modal-close-btn" id="closeSheetModalBtn">×</button></div>
  <div class="field"><label>이름</label><input class="input" id="sheetNameInput" placeholder="예: 6월 예산, 7월 생활비"></div>
  <div class="modal-actions"><button class="action-btn cancel-btn" id="cancelSheetBtn">취소</button><button class="action-btn save-btn" id="saveSheetBtn">저장</button></div>
</div></div></div>

<div class="modal-backdrop" id="githubModalBackdrop"><div class="modal-wrap"><div class="modal">
  <div class="modal-head"><div class="modal-title">GitHub 설정</div><button class="modal-close-btn" id="closeGithubModalBtn">×</button></div>
  <div class="field"><label>Owner</label><input class="input" id="ghOwnerInput" value="kwonjinbeom"></div>
  <div class="field"><label>Repo</label><input class="input" id="ghRepoInput" value="budget_manage"></div>
  <div class="field"><label>Branch</label><input class="input" id="ghBranchInput" value="main"></div>
  <div class="field"><label>Data file path</label><input class="input" id="ghPathInput" value="data.json"></div>
  <div class="field"><label>GitHub Token</label><input class="input" id="ghTokenInput" type="password" placeholder="fine-grained token 붙여넣기"></div>
  <div class="warn">
    토큰은 이 브라우저 localStorage에만 저장돼. HTML 파일이나 GitHub repo에는 저장되지 않아.<br>
    토큰 권한은 budget_manage repo의 Contents: Read and write가 필요해.
  </div>
  <div class="modal-actions"><button class="action-btn cancel-btn" id="cancelGithubBtn">취소</button><button class="action-btn save-btn" id="saveGithubSettingBtn">저장</button></div>
</div></div></div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY="simple_budget_sheets_v2";
const GH_KEY="simple_budget_github_setting_v1";
const SUMMARY_COLLAPSED_KEY="simple_budget_summary_collapsed_v1";
const EXPORT_VERSION=9;
const DATA_CRYPT_KEY="jb";
const AUTOSAVE_DELAY=0;

let state=normalizeState(loadState());
let editingItemId=null, selectedType="income", sheetMode="rename", editingSheetId=null;
let autoSaveTimer=null;
let toastTimer=null;
let isApplyingRemote=false;
let isGithubSaving=false;
let hasPendingGithubSave=false;
let lastGithubSha="";
let lastGithubError="";
let lastSyncText="자동 동기화 대기 중";

const $=id=>document.getElementById(id);
const sheetTitle=$("sheetTitle"), subTitle=$("subTitle"), balanceAmount=$("balanceAmount"), incomeAmount=$("incomeAmount"), expenseAmount=$("expenseAmount"), list=$("list"), summaryBox=$("summaryBox"), summaryToggleBtn=$("summaryToggleBtn");
const drawerBackdrop=$("drawerBackdrop"), sheetList=$("sheetList"), githubStatus=$("githubStatus");
const itemModalBackdrop=$("itemModalBackdrop"), itemModalTitle=$("itemModalTitle"), dayInput=$("dayInput"), nameInput=$("nameInput"), amountInput=$("amountInput"), noteInput=$("noteInput"), incomeTypeBtn=$("incomeTypeBtn"), expenseTypeBtn=$("expenseTypeBtn"), deleteItemBtn=$("deleteItemBtn");
const sheetModalBackdrop=$("sheetModalBackdrop"), sheetModalTitle=$("sheetModalTitle"), sheetNameInput=$("sheetNameInput");
const githubModalBackdrop=$("githubModalBackdrop"), importFileInput=$("importFileInput");

$("menuBtn").onclick=openDrawer;$("drawerCloseBtn").onclick=closeDrawer;$("newSheetBtn").onclick=()=>openSheetModal("new");$("renameBtn").onclick=()=>openSheetModal("rename",state.currentSheetId);summaryToggleBtn.onclick=toggleSummary;
$("exportBtn").onclick=exportData;$("importBtn").onclick=()=>importFileInput.click();importFileInput.onchange=importData;
$("loadGithubBtn").onclick=()=>loadFromGithub({manual:true});$("saveGithubBtn").onclick=()=>requestGithubSave({manual:true});$("testGithubBtn").onclick=testGithubConnection;$("githubSettingBtn").onclick=openGithubModal;
drawerBackdrop.onclick=e=>{if(e.target===drawerBackdrop)closeDrawer()};

$("addBtn").onclick=()=>openItemModal();$("cancelItemBtn").onclick=closeItemModal;$("closeItemModalBtn").onclick=closeItemModal;$("saveItemBtn").onclick=saveItem;deleteItemBtn.onclick=deleteItem;
itemModalBackdrop.onclick=e=>{};
incomeTypeBtn.onclick=()=>setType("income");expenseTypeBtn.onclick=()=>setType("expense");
amountInput.addEventListener("input", formatAmountInput);

$("cancelSheetBtn").onclick=closeSheetModal;$("closeSheetModalBtn").onclick=closeSheetModal;$("saveSheetBtn").onclick=saveSheetName;
sheetModalBackdrop.onclick=e=>{};

$("cancelGithubBtn").onclick=closeGithubModal;$("closeGithubModalBtn").onclick=closeGithubModal;$("saveGithubSettingBtn").onclick=saveGithubSetting;
githubModalBackdrop.onclick=e=>{};

function newId(){return crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())}
function loadState(){try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY));if(s&&s.sheets&&s.sheets.length)return s}catch{}const id=newId();return{version:EXPORT_VERSION,currentSheetId:id,sheets:[{id,name:"기본 예산표",items:[]}]}}
function normalizeState(raw){if(!raw||!Array.isArray(raw.sheets)||!raw.sheets.length)raw=loadState();raw.version=EXPORT_VERSION;raw.sheets=raw.sheets.map((s,si)=>{const ns={id:s.id||newId(),name:s.name||`예산표 ${si+1}`,items:Array.isArray(s.items)?s.items:[]};ns.items=ns.items.map((it,i)=>({id:it.id||newId(),name:it.name||"이름 없음",amount:Number(it.amount)||0,type:it.type==="expense"?"expense":"income",day:it.day===""||it.day==null?"":Number(it.day),note:it.note||"",order:Number.isFinite(Number(it.order))?Number(it.order):i}));ns.items.sort((a,b)=>a.order-b.order).forEach((it,i)=>it.order=i);return ns});if(!raw.currentSheetId||!raw.sheets.some(s=>s.id===raw.currentSheetId))raw.currentSheetId=raw.sheets[0].id;return raw}
function saveState(){state=normalizeState(state);localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function commitChange(){saveState();render();scheduleAutoSave()}
function getCurrentSheet(){let s=state.sheets.find(x=>x.id===state.currentSheetId);if(!s){s=state.sheets[0];state.currentSheetId=s.id;saveState()}return s}
function money(v){return Number(v||0).toLocaleString("ko-KR")+"원"}
function dayText(d){const n=Number(d);return n?`${n}일`:"일자없음"}
function esc(t){return String(t).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function nowText(){const d=new Date();return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`}


function applySummaryCollapsed(){
 const collapsed=localStorage.getItem(SUMMARY_COLLAPSED_KEY)==="Y";
 summaryBox.classList.toggle("collapsed",collapsed);
 summaryToggleBtn.textContent=collapsed?"⌄":"⌃";
 summaryToggleBtn.title=collapsed?"펼치기":"접기";
}
function toggleSummary(){
 const collapsed=localStorage.getItem(SUMMARY_COLLAPSED_KEY)==="Y";
 localStorage.setItem(SUMMARY_COLLAPSED_KEY,collapsed?"N":"Y");
 applySummaryCollapsed();
}

function render(){
 applySummaryCollapsed();
 state=normalizeState(state);const sheet=getCurrentSheet();const items=[...(sheet.items||[])].sort((a,b)=>a.order-b.order);
 const inc=items.filter(i=>i.type==="income").reduce((s,i)=>s+i.amount,0), exp=items.filter(i=>i.type==="expense").reduce((s,i)=>s+i.amount,0);
 sheetTitle.textContent=sheet.name;incomeAmount.textContent=money(inc);expenseAmount.textContent=money(exp);balanceAmount.textContent=money(inc-exp);
 const gh=getGithubSetting();subTitle.textContent=`${gh.owner}/${gh.repo} · ${gh.path}`;
 list.innerHTML="";
 if(!items.length)list.innerHTML=`<div class="empty">아직 추가한 내역이 없어</div>`;
 else items.forEach((item,index)=>{const el=document.createElement("div");el.className="item";const sign=item.type==="income"?"+":"-";const cls=item.type==="income"?"income":"expense";const note=item.note?esc(item.note):"비고 없음";const noteClass=item.note?"item-note":"item-note empty-note";el.innerHTML=`<div class="item-left"><div class="item-top"><span class="day-badge">${dayText(item.day)}</span><div class="item-name">${esc(item.name)}</div></div><div class="${noteClass}">${note}</div></div><div class="item-right"><div class="item-amount ${cls}">${sign}${money(item.amount)}</div><div class="item-actions"><button class="mini-btn up-btn" ${index===0?"disabled":""}>↑</button><button class="mini-btn down-btn" ${index===items.length-1?"disabled":""}>↓</button><button class="edit-btn">수정</button></div></div>`;el.querySelector(".edit-btn").onclick=()=>openItemModal(item);el.querySelector(".up-btn").onclick=()=>moveItem(item.id,-1);el.querySelector(".down-btn").onclick=()=>moveItem(item.id,1);list.appendChild(el)});
 renderSheetList();updateGithubStatus()
}
function renderSheetList(){sheetList.innerHTML="";state.sheets.forEach(sheet=>{const inc=(sheet.items||[]).filter(i=>i.type==="income").reduce((s,i)=>s+i.amount,0),exp=(sheet.items||[]).filter(i=>i.type==="expense").reduce((s,i)=>s+i.amount,0);const row=document.createElement("div");row.className="sheet-item"+(sheet.id===state.currentSheetId?" active":"");row.innerHTML=`<div style="min-width:0"><div class="sheet-name">${esc(sheet.name)}</div><div class="sheet-meta">남은 금액 ${money(inc-exp)}</div></div><div class="sheet-actions"><button class="sheet-edit">수정</button><button class="sheet-delete">삭제</button></div>`;row.onclick=()=>{state.currentSheetId=sheet.id;commitChange();closeDrawer()};row.querySelector(".sheet-edit").onclick=e=>{e.stopPropagation();openSheetModal("rename",sheet.id)};row.querySelector(".sheet-delete").onclick=e=>{e.stopPropagation();deleteSheet(sheet.id)};sheetList.appendChild(row)})}
function openDrawer(){drawerBackdrop.classList.add("open");renderSheetList();updateGithubStatus()}function closeDrawer(){drawerBackdrop.classList.remove("open")}


function onlyDigits(value){
 return String(value||"").replace(/[^\d]/g,"");
}
function formatNumberWithComma(value){
 const digits=onlyDigits(value);
 if(!digits)return "";
 return Number(digits).toLocaleString("ko-KR");
}
function formatAmountInput(){
 const formatted=formatNumberWithComma(amountInput.value);
 amountInput.value=formatted;
}
function getAmountNumber(){
 const digits=onlyDigits(amountInput.value);
 return digits?Number(digits):0;
}

function openItemModal(item=null){editingItemId=item?item.id:null;if(item){itemModalTitle.textContent="수정";dayInput.value=item.day||"";nameInput.value=item.name;amountInput.value=formatNumberWithComma(item.amount);noteInput.value=item.note||"";setType(item.type);deleteItemBtn.classList.add("show")}else{itemModalTitle.textContent="추가";dayInput.value="";nameInput.value="";amountInput.value="";noteInput.value="";setType("income");deleteItemBtn.classList.remove("show")}itemModalBackdrop.classList.add("open");setTimeout(()=>dayInput.focus(),100)}
function closeItemModal(){itemModalBackdrop.classList.remove("open");editingItemId=null}
function setType(t){selectedType=t;incomeTypeBtn.classList.toggle("active",t==="income");expenseTypeBtn.classList.toggle("active",t==="expense")}
function saveItem(){const sheet=getCurrentSheet(),dv=dayInput.value.trim(),day=dv===""?"":Number(dv),name=nameInput.value.trim(),amount=getAmountNumber(),note=noteInput.value.trim();if(day!==""&&(!Number.isInteger(day)||day<1||day>31)){alert("일자는 1~31 사이로 입력해줘.");dayInput.focus();return}if(!name){alert("이름을 입력해줘.");nameInput.focus();return}if(!amount||amount<=0){alert("금액을 입력해줘.");amountInput.focus();return}if(!sheet.items)sheet.items=[];if(editingItemId)sheet.items=sheet.items.map(i=>i.id!==editingItemId?i:{...i,day,name,amount,note,type:selectedType});else sheet.items.push({id:newId(),day,name,amount,note,type:selectedType,order:sheet.items.length});normalizeOrder(sheet);closeItemModal();commitChange()}
function deleteItem(){const sheet=getCurrentSheet();if(!editingItemId)return;if(!confirm("삭제할까?"))return;sheet.items=(sheet.items||[]).filter(i=>i.id!==editingItemId);normalizeOrder(sheet);closeItemModal();commitChange()}
function moveItem(id,dir){const sheet=getCurrentSheet();const items=[...(sheet.items||[])].sort((a,b)=>a.order-b.order);const idx=items.findIndex(i=>i.id===id),t=idx+dir;if(idx<0||t<0||t>=items.length)return;[items[idx],items[t]]=[items[t],items[idx]];items.forEach((i,n)=>i.order=n);sheet.items=items;commitChange()}
function normalizeOrder(sheet){sheet.items=[...(sheet.items||[])].sort((a,b)=>a.order-b.order);sheet.items.forEach((i,n)=>i.order=n)}

function openSheetModal(mode,sheetId=null){sheetMode=mode;editingSheetId=sheetId||state.currentSheetId;const sheet=state.sheets.find(s=>s.id===editingSheetId)||getCurrentSheet();sheetModalTitle.textContent=mode==="new"?"새 지출표 만들기":"지출표 이름 수정";sheetNameInput.value=mode==="new"?"":sheet.name;sheetModalBackdrop.classList.add("open");setTimeout(()=>sheetNameInput.focus(),100)}
function closeSheetModal(){sheetModalBackdrop.classList.remove("open");editingSheetId=null}
function saveSheetName(){const name=sheetNameInput.value.trim();if(!name){alert("이름을 입력해줘.");return}if(sheetMode==="new"){const id=newId();state.sheets.unshift({id,name,items:[]});state.currentSheetId=id;closeDrawer()}else{const s=state.sheets.find(x=>x.id===editingSheetId);if(s)s.name=name}closeSheetModal();commitChange()}
function deleteSheet(id){if(state.sheets.length<=1){alert("지출표는 최소 1개는 있어야 해.");return}const s=state.sheets.find(x=>x.id===id);if(!confirm(`"${s.name}" 지출표를 삭제할까?`))return;state.sheets=state.sheets.filter(x=>x.id!==id);if(state.currentSheetId===id)state.currentSheetId=state.sheets[0].id;commitChange()}

function exportData(){const data={app:"simple_budget_sheets",version:EXPORT_VERSION,exportedAt:new Date().toISOString(),state:normalizeState(state)};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const d=new Date(),fn=`budget-backup-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}.json`;const a=document.createElement("a");a.href=url;a.download=fn;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
function importData(e){const file=e.target.files&&e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{const p=JSON.parse(r.result),s=p.state||p;if(!s||!Array.isArray(s.sheets)){alert("가져올 수 없는 파일이야.");return}if(!confirm("현재 데이터가 가져온 파일 내용으로 바뀌어. 계속할까?"))return;state=normalizeState(s);saveState();closeDrawer();render();scheduleAutoSave();alert("가져오기 완료.")}catch{alert("파일을 읽는 중 오류가 났어.")}finally{importFileInput.value=""}};r.readAsText(file,"utf-8")}


function showToast(message,type="normal"){
 const el=$("toast");
 if(!el)return;
 el.textContent=message;
 el.classList.toggle("error",type==="error");
 el.classList.add("show");
 clearTimeout(toastTimer);
 toastTimer=setTimeout(()=>el.classList.remove("show"),1800);
}


function xorCrypt(text,key){
 let out="";
 for(let i=0;i<text.length;i++){
   out+=String.fromCharCode(text.charCodeAt(i)^key.charCodeAt(i%key.length));
 }
 return out;
}
function encodeBase64Unicode(text){
 return btoa(unescape(encodeURIComponent(text)));
}
function decodeBase64Unicode(text){
 return decodeURIComponent(escape(atob(text)));
}
function encryptBudgetPayload(payload){
 const plain=JSON.stringify(payload);
 const xored=xorCrypt(plain,DATA_CRYPT_KEY);
 return {
   app:"simple_budget_sheets",
   encrypted:true,
   method:"xor-base64",
   version:EXPORT_VERSION,
   updatedAt:new Date().toISOString(),
   data:encodeBase64Unicode(xored)
 };
}
function decryptBudgetPayload(payload){
 if(payload && payload.encrypted && payload.data){
   const xored=decodeBase64Unicode(payload.data);
   const plain=xorCrypt(xored,DATA_CRYPT_KEY);
   return JSON.parse(plain);
 }
 return payload && payload.state ? payload.state : payload;
}

function getGithubSetting(){try{return{owner:"kwonjinbeom",repo:"budget_manage",branch:"main",path:"data.json",token:"",autoLoad:true,autoSave:true,...JSON.parse(localStorage.getItem(GH_KEY)||"{}")}}catch{return{owner:"kwonjinbeom",repo:"budget_manage",branch:"main",path:"data.json",token:"",autoLoad:true,autoSave:true}}}
function saveGithubSetting(){const s={owner:$("ghOwnerInput").value.trim(),repo:$("ghRepoInput").value.trim(),branch:$("ghBranchInput").value.trim()||"main",path:$("ghPathInput").value.trim()||"data.json",token:$("ghTokenInput").value.trim(),autoLoad:true,autoSave:true};if(!s.owner||!s.repo||!s.token){alert("Owner, Repo, Token은 필요해.");return}localStorage.setItem(GH_KEY,JSON.stringify(s));closeGithubModal();render();loadFromGithub({manual:false});alert("GitHub 설정 저장 완료. 이제 실행 시 자동 불러오기, 수정 시 자동 저장이 동작해.")}
function openGithubModal(){const s=getGithubSetting();$("ghOwnerInput").value=s.owner;$("ghRepoInput").value=s.repo;$("ghBranchInput").value=s.branch;$("ghPathInput").value=s.path;$("ghTokenInput").value=s.token;githubModalBackdrop.classList.add("open")}
function closeGithubModal(){githubModalBackdrop.classList.remove("open")}
function updateGithubStatus(){
 const s=getGithubSetting();
 const tokenText=s.token?"토큰 저장됨":"토큰 미설정";
 const errText=lastGithubError?`\n오류: ${lastGithubError}`:"";
 githubStatus.textContent=`repo: ${s.owner}/${s.repo}\nfile: ${s.path} · branch: ${s.branch}\n암호화 저장: jb · ${tokenText} · ${lastSyncText}${errText}`;
}

function shortErrorText(e){
 let msg="";
 if(e && e.message) msg=String(e.message);
 else msg=String(e||"unknown error");
 try{
   const jsonStart=msg.indexOf("{");
   if(jsonStart>=0){
     const parsed=JSON.parse(msg.slice(jsonStart));
     if(parsed && parsed.message) msg=msg.slice(0,jsonStart).trim()+" "+parsed.message;
   }
 }catch{}
 return msg.replace(/\s+/g," ").slice(0,260);
}

function ghHeaders(token){return{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"}}
async function getGithubFile(s){
 const pathParts=s.path.split("/").map(encodeURIComponent).join("/");
 const url=`https://api.github.com/repos/${encodeURIComponent(s.owner)}/${encodeURIComponent(s.repo)}/contents/${pathParts}?ref=${encodeURIComponent(s.branch)}&t=${Date.now()}`;
 const res=await fetch(url,{headers:ghHeaders(s.token),cache:"no-store"});
 if(res.status===404)return null;
 if(!res.ok)throw new Error(`${res.status} ${await res.text()}`);
 return await res.json();
}
function encodeBase64Utf8(str){return btoa(unescape(encodeURIComponent(str)))}
function decodeBase64Utf8(str){return decodeURIComponent(escape(atob(str.replace(/\n/g,""))))}

async function loadFromGithub({manual=false}={}){
 const s=getGithubSetting();if(!s.token){if(manual){alert("먼저 GitHub 설정에서 토큰을 넣어줘.");openGithubModal()}return}
 try{lastSyncText="GitHub 불러오는 중...";updateGithubStatus();const file=await getGithubFile(s);if(!file){lastSyncText="data.json 없음. 저장하면 생성됨";updateGithubStatus();if(manual)alert("data.json 파일이 아직 없어. 현재 데이터를 GitHub에 먼저 저장하면 생성돼.");return}
 const parsed=JSON.parse(decodeBase64Utf8(file.content));const imported=decryptBudgetPayload(parsed);if(!imported||!Array.isArray(imported.sheets))throw new Error("invalid data");
 if(manual&&!confirm("GitHub의 data.json 내용으로 현재 화면 데이터가 바뀌어. 계속할까?")){lastSyncText="수동 불러오기 취소";updateGithubStatus();return}
 isApplyingRemote=true;state=normalizeState(imported);lastGithubSha=file.sha;saveState();render();isApplyingRemote=false;lastSyncText=`GitHub 불러오기 완료 ${nowText()}`;updateGithubStatus();if(manual)alert("GitHub 불러오기 완료.")
 }catch(e){console.error(e);isApplyingRemote=false;lastGithubError=shortErrorText(e);lastSyncText=`불러오기 실패 ${nowText()}`;updateGithubStatus();if(manual)alert("GitHub 불러오기 실패: "+lastGithubError)}
}

function scheduleAutoSave(){
 if(isApplyingRemote)return;
 const s=getGithubSetting();if(!s.token||!s.autoSave)return;
 clearTimeout(autoSaveTimer);
 requestGithubSave({manual:false});
}



async function testGithubConnection(){
 const s=getGithubSetting();
 if(!s.token){
   alert("먼저 GitHub 설정에서 토큰을 넣어줘.");
   openGithubModal();
   return;
 }
 try{
   lastGithubError="";
   lastSyncText="GitHub 연결 테스트 중...";
   updateGithubStatus();
   const file=await getGithubFile(s);
   if(file&&file.sha){
     lastGithubSha=file.sha;
     lastSyncText=`연결 성공 ${nowText()} · sha ${file.sha.slice(0,7)}`;
     updateGithubStatus();
     showToast("GitHub 연결 성공");
   }else{
     lastSyncText=`연결 성공 ${nowText()} · data.json 없음`;
     updateGithubStatus();
     showToast("GitHub 연결 성공");
   }
 }catch(e){
   lastGithubError=shortErrorText(e);
   lastSyncText=`연결 실패 ${nowText()}`;
   updateGithubStatus();
   showToast("GitHub 연결 실패","error");
   alert("GitHub 연결 실패: "+lastGithubError);
 }
}

function requestGithubSave({manual=false}={}){
 if(isGithubSaving){
   hasPendingGithubSave=true;
   lastSyncText="저장 중. 다음 저장 대기...";
   updateGithubStatus();
   return;
 }
 saveToGithub({manual});
}

async function saveToGithub({manual=false}={}){
 const s=getGithubSetting();
 if(!s.token){
   if(manual){
     alert("먼저 GitHub 설정에서 토큰을 넣어줘.");
     openGithubModal();
   }
   return;
 }

 if(isGithubSaving){
   hasPendingGithubSave=true;
   return;
 }

 isGithubSaving=true;

 try{
   clearTimeout(autoSaveTimer);
   lastSyncText=manual?"GitHub 수동 저장 중...":"GitHub 자동 저장 중...";
   updateGithubStatus();

   let saveOk=false;
   let lastError=null;

   for(let attempt=1; attempt<=3; attempt++){
     try{
       const file=await getGithubFile(s);
       if(!lastGithubSha && file && file.sha) lastGithubSha=file.sha;

       const body={
         message:manual?"manual update budget data":"auto update budget data",
         content:encodeBase64Utf8(JSON.stringify(encryptBudgetPayload(normalizeState(state)),null,2)),
         branch:s.branch
       };

       if(lastGithubSha)body.sha=lastGithubSha; else if(file&&file.sha)body.sha=file.sha;

       const pathParts=s.path.split("/").map(encodeURIComponent).join("/");
       const url=`https://api.github.com/repos/${encodeURIComponent(s.owner)}/${encodeURIComponent(s.repo)}/contents/${pathParts}`;

       const res=await fetch(url,{
         method:"PUT",
         headers:{...ghHeaders(s.token),"Content-Type":"application/json"},
         body:JSON.stringify(body)
       });

       if(res.ok){
         const result=await res.json();
         lastGithubSha=result.content&&result.content.sha?result.content.sha:"";
         saveOk=true;
         break;
       }

       const text=await res.text();
       lastError=new Error(`${res.status} ${text}`);

       // 409 is the common sha conflict. Refetch and retry.
       if(res.status===409 || res.status===422){
         lastGithubSha="";
         await new Promise(resolve=>setTimeout(resolve,350*attempt));
         continue;
       }

       throw lastError;
     }catch(err){
       lastError=err;
       await new Promise(resolve=>setTimeout(resolve,250*attempt));
     }
   }

   if(!saveOk)throw lastError||new Error("unknown save error");

   lastGithubError="";
   lastSyncText=`GitHub 저장 완료 ${nowText()}`;
   updateGithubStatus();
   showToast(`GitHub 저장 완료 ${nowText()}`);
   if(manual)console.log("GitHub 저장 완료.");
 }catch(e){
   console.error(e);
   const msg=shortErrorText(e);
   lastGithubError=msg;
   lastSyncText=`저장 실패 ${nowText()}`;
   updateGithubStatus();
   showToast("GitHub 저장 실패","error");
   if(manual)alert("GitHub 저장 실패: "+msg);
 }finally{
   isGithubSaving=false;

   if(hasPendingGithubSave){
     hasPendingGithubSave=false;
     lastSyncText="대기 중인 변경분 저장 중...";
     updateGithubStatus();
     setTimeout(()=>requestGithubSave({manual:false}),50);
   }
 }
}
saveState();
render();
setTimeout(()=>loadFromGithub({manual:false}),300);
</script>
